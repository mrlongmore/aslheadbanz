<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Headbanz 🏫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        body { 
            touch-action: none; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
            transition: background-color 0.3s ease;
            background-color: #00a8ff;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        .heads-up-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            width: 80vw;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .bg-correct { background-color: #4cd137 !important; }
        .bg-pass { background-color: #e84118 !important; }
        
        #orientation-warning { 
            display: none; position: fixed; inset: 0; background: #00a8ff; 
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }

        #word-display {
            font-size: clamp(3rem, 10vw, 7rem);
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            padding: 20px;
        }

        .timer-badge {
            background: rgba(0,0,0,0.5);
            padding: 10px 25px;
            border-radius: 100px;
            font-size: 1.5rem;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Animation for correct/pass */
        .pop-effect { animation: pop 0.4s ease; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (orientation: portrait) {
            .heads-up-card {
                height: 50vh;
            }
            #word-display {
                font-size: clamp(2rem, 8vw, 5rem);
            }
        }

        @media (orientation: landscape) {
            .heads-up-card {
                height: 50vh;
            }
        }
    </style>
</head>
<body class="text-white flex items-center justify-center">

    <!-- Orientation Overlay -->
    <div id="orientation-warning">
        <div class="text-8xl mb-6">📱</div>
        <h2 class="text-4xl font-black mb-4">PLACE ON FOREHEAD</h2>
        <p class="text-xl opacity-90 max-w-sm">Hold phone sideways (Landscape) with the screen facing your friends!</p>
    </div>

    <!-- 1. Start Screen -->
    <div id="start-screen" class="text-center p-6 flex flex-col items-center">
        <div class="mb-10">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter text-white drop-shadow-2xl">HEADS<br>UP!</h1>
            <p class="text-2xl font-bold text-yellow-300 mt-2">School Edition 🏫</p>
        </div>
        
        <button onclick="initGame()" class="bg-white text-blue-600 px-16 py-6 rounded-full font-black text-3xl shadow-2xl hover:scale-105 active:scale-95 transition-all">
            PLAY
        </button>
    </div>

    <!-- 2. Countdown Screen -->
    <div id="countdown-screen" class="hidden text-center">
        <div id="countdown-number" class="text-[15rem] font-black italic">3</div>
    </div>

    <!-- 3. Active Game Screen -->
    <div id="game-screen" class="hidden flex-col items-center justify-center h-full w-full relative">
        <div class="absolute top-8 w-full flex justify-center">
            <div id="timer" class="timer-badge font-black">60</div>
        </div>
        
        <div class="heads-up-card" id="card-element">
            <div id="word-display" class="font-black"></div>
        </div>

        <div class="absolute bottom-8 text-lg font-bold opacity-50 uppercase tracking-widest">
            Twist left for Correct • Twist right to Pass
        </div>
    </div>

    <!-- 4. End Screen -->
    <div id="end-screen" class="hidden text-center p-6">
        <h2 class="text-4xl font-black mb-2 opacity-80">GREAT JOB!</h2>
        <div class="text-2xl font-bold text-yellow-300 mb-2 uppercase">Your Score</div>
        <div id="final-score" class="text-[12rem] font-black leading-none mb-10">0</div>
        <button onclick="window.location.reload()" class="bg-white text-blue-600 px-14 py-5 rounded-full font-black text-2xl shadow-xl">
            PLAY AGAIN
        </button>
    </div>

    <script>
        const WORD_LIST = ["CLASS 🏫", "TAKE-UP 📝", "AGRICULTURE 🚜", "ALGEBRA ➗", "HUMAN ANATOMY 🦴", "ART 🎨", "AUTO SHOP 🏎️", "BIOLOGY 🧬", "CHEMISTRY 🧪", "COMPUTER SCIENCE 💻", "COOKING 🧑‍🍳", "DESIGN 📐", "ENGINEERING ⚙️", "ENGLISH 📚", "GEOMETRY 📐", "HISTORY 📜", "INTEGRATED MATH 🔢", "MATH ➕", "METAL SHOP 🛠️", "MUSIC/BAND 🎺", "PE ⚽", "PHYSICS ⚛️", "SCIENCE 🧪", "STATISTICS 📊", "STUDY 📖", "WOOD SHOP 🪵"];

        let words = [];
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let canAction = true;
        let baseGamma = null;
        let timerInterval = null;

        const TILT_THRESHOLD = 20;       // degrees you must tilt after calibration
        const NEUTRAL_THRESHOLD = 12;    // degrees to return to center before next action

        const warningEl = document.getElementById('orientation-warning');

        // Check orientation constantly
        window.addEventListener('orientationchange', checkOrientation);
        window.addEventListener('resize', checkOrientation);

        function checkOrientation() {
            // Horizontal check: window.innerWidth should be greater than window.innerHeight
            if (window.innerHeight > window.innerWidth) {
                warningEl.style.display = 'flex';
            } else {
                warningEl.style.display = 'none';
            }
        }
        checkOrientation();

        async function initGame() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') runCountdown();
                } catch (e) { alert("Enable Motion Sensors to play!"); }
            } else {
                runCountdown();
            }
        }

        function runCountdown() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('countdown-screen').classList.remove('hidden');
            let count = 3;
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById('countdown-number').innerText = count;
                    if (navigator.vibrate) navigator.vibrate(50);
                } else {
                    clearInterval(interval);
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            words = [...WORD_LIST].sort(() => Math.random() - 0.5);
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('flex');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // Calibration: Find 'flat' relative to how they hold it on forehead
            const calibrate = (e) => {
                baseGamma = e.gamma; 
                window.removeEventListener('deviceorientation', calibrate);
                window.addEventListener('deviceorientation', handleTilt);
            };
            window.addEventListener('deviceorientation', calibrate);

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 10) document.getElementById('timer').classList.add('text-red-500');
                if (timeLeft <= 0) endGame();
            }, 1000);

            displayNextWord();
            gameActive = true;
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
        }

        function handleTilt(event) {
            if (!gameActive || !canAction || baseGamma === null || event.gamma === null) return;

            const diff = event.gamma - baseGamma;

            if (Math.abs(diff) < TILT_THRESHOLD) return;

            // Twist left = correct, twist right = pass
            if (diff < -TILT_THRESHOLD) {
                processPoint(true);
            } else if (diff > TILT_THRESHOLD) {
                processPoint(false);
            }
        }

        function processPoint(isCorrect) {
            canAction = false;
            const card = document.getElementById('card-element');
            
            if (isCorrect) {
                score++;
                document.body.classList.add('bg-correct');
                document.getElementById('word-display').innerText = "CORRECT!";
            } else {
                document.body.classList.add('bg-pass');
                document.getElementById('word-display').innerText = "PASS";
            }

            card.classList.add('pop-effect');
            if (navigator.vibrate) isCorrect ? navigator.vibrate(150) : navigator.vibrate([100, 50, 100]);

            setTimeout(() => {
                document.body.className = "text-white flex items-center justify-center";
                card.classList.remove('pop-effect');
                displayNextWord();
                
                // Must return to center
                const checkNeutral = (e) => {
                    if (Math.abs(e.gamma - baseGamma) < NEUTRAL_THRESHOLD) {
                        window.removeEventListener('deviceorientation', checkNeutral);
                        canAction = true;
                    }
                };
                window.addEventListener('deviceorientation', checkNeutral);
            }, 600);
        }

        function displayNextWord() {
            if (words.length === 0) words = [...WORD_LIST].sort(() => Math.random() - 0.5);
            document.getElementById('word-display').innerText = words.pop();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.body.style.backgroundColor = "#2f3640";
        }
    </script>
</body>
</html>
