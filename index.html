<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Headbanz 🏫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            touch-action: none; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow: hidden; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #1e40af;
            height: 100vh;
            width: 100vw;
        }
        .bg-correct { background-color: #16a34a !important; }
        .bg-pass { background-color: #dc2626 !important; }
        
        #orientation-warning { display: none; }
        @media screen and (orientation: portrait) {
            #orientation-warning { 
                display: flex; position: fixed; inset: 0; background: #1e3a8a; 
                z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
                text-align: center; padding: 2rem;
            }
        }

        /* Ensure the word fits and scales */
        .word-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            width: 100vw;
            padding: 0 2rem;
        }
        
        #word-display {
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 1;
            word-wrap: break-word;
            text-align: center;
        }
    </style>
</head>
<body class="text-white flex items-center justify-center">

    <div id="orientation-warning">
        <div class="animate-bounce text-6xl mb-6">🔄</div>
        <h2 class="text-3xl font-black mb-2">ROTATE PHONE</h2>
        <p class="text-lg opacity-80">Please turn your phone sideways to play!</p>
    </div>

    <!-- 1. Start Screen -->
    <div id="start-screen" class="text-center p-6 max-w-2xl">
        <h1 class="text-5xl md:text-6xl font-black mb-4 tracking-tight text-yellow-300">SCHOOL HEADBANZ</h1>
        <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl mb-6 border border-white/20">
            <p class="text-lg mb-4 font-bold">Tilt <span class="text-green-400">DOWN</span> for Correct ✅<br>Tilt <span class="text-red-400">UP</span> to Pass ⏭️</p>
        </div>
        <button onclick="initGame()" class="bg-yellow-400 text-blue-900 px-14 py-6 rounded-full font-black text-3xl shadow-[0_8px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all">
            START ROUND
        </button>
    </div>

    <!-- 2. Countdown Screen -->
    <div id="countdown-screen" class="hidden text-center">
        <div id="countdown-number" class="text-[12rem] font-black leading-none">3</div>
        <p class="text-2xl font-bold uppercase tracking-widest">To your forehead!</p>
    </div>

    <!-- 3. Active Game Screen -->
    <div id="game-screen" class="hidden flex-col items-center justify-between h-full w-full py-8">
        <div class="w-full px-10 flex justify-between items-center">
            <div class="bg-black/40 backdrop-blur-md px-6 py-2 rounded-2xl">
                <p id="timer" class="text-4xl font-mono font-bold text-yellow-300">60</p>
            </div>
            <div class="bg-black/40 backdrop-blur-md px-6 py-2 rounded-2xl text-center">
                <p id="score-counter" class="text-4xl font-bold">0</p>
            </div>
        </div>
        
        <div class="word-container">
            <div id="word-display" class="font-black uppercase select-none"></div>
        </div>
        
        <div class="opacity-40 text-sm font-bold tracking-widest uppercase">
            Down: Correct | Up: Pass
        </div>
    </div>

    <!-- 4. Final Score Screen -->
    <div id="end-screen" class="hidden text-center p-6">
        <h2 class="text-3xl font-black mb-2 opacity-80">ROUND OVER!</h2>
        <div id="final-score" class="text-[10rem] font-black leading-none mb-6 text-yellow-300">0</div>
        <button onclick="window.location.reload()" class="bg-white text-blue-700 px-12 py-5 rounded-full font-black text-2xl shadow-xl">
            PLAY AGAIN
        </button>
    </div>

    <script>
        const WORD_LIST = ["CLASS 🏫", "TAKE-UP 📝", "AGRICULTURE 🚜", "ALGEBRA ➗", "HUMAN ANATOMY 🦴", "ART 🎨", "AUTO SHOP 🏎️", "BIOLOGY 🧬", "CHEMISTRY 🧪", "COMPUTER SCIENCE 💻", "COOKING 🧑‍🍳", "DESIGN 📐", "ENGINEERING ⚙️", "ENGLISH 📚", "GEOMETRY 📐", "HISTORY 📜", "INTEGRATED MATH 🔢", "MATH ➕", "METAL SHOP 🛠️", "MUSIC/BAND 🎺", "PE ⚽", "PHYSICS ⚛️", "SCIENCE 🧪", "STATISTICS 📊", "STUDY 📖", "WOOD SHOP 🪵"];

        let words = [];
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let canAction = true;
        let baseBeta = null;
        let timerInterval = null;

        async function initGame() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') runCountdown();
                } catch (e) { alert("Sensor access required!"); }
            } else {
                runCountdown();
            }
        }

        function runCountdown() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('countdown-screen').classList.remove('hidden');
            let count = 3;
            const interval = setInterval(() => {
                count--;
                if (count > 0) document.getElementById('countdown-number').innerText = count;
                else { clearInterval(interval); startGame(); }
            }, 1000);
        }

        function startGame() {
            words = [...WORD_LIST].sort(() => Math.random() - 0.5);
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('flex');
            document.getElementById('game-screen').classList.remove('hidden');
            
            const calibrate = (e) => {
                baseBeta = e.beta; 
                window.removeEventListener('deviceorientation', calibrate);
                window.addEventListener('deviceorientation', handleTilt);
            };
            window.addEventListener('deviceorientation', calibrate);

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            displayNextWord();
            gameActive = true;
        }

        function handleTilt(event) {
            if (!gameActive || !canAction || baseBeta === null) return;

            const diff = event.beta - baseBeta;

            // Tightened thresholds (20 degrees instead of 30)
            if (diff < -20) {
                processPoint(true);
            } else if (diff > 20) {
                processPoint(false);
            }
        }

        function processPoint(isCorrect) {
            canAction = false;
            if (isCorrect) {
                score++;
                document.getElementById('score-counter').innerText = score;
                document.body.classList.add('bg-correct');
            } else {
                document.body.classList.add('bg-pass');
            }

            if (navigator.vibrate) isCorrect ? navigator.vibrate(100) : navigator.vibrate([50, 50, 50]);

            setTimeout(() => {
                displayNextWord();
                // Wait for player to return to "neutral" before allowing next action
                const checkNeutral = (e) => {
                    if (Math.abs(e.beta - baseBeta) < 10) {
                        window.removeEventListener('deviceorientation', checkNeutral);
                        canAction = true;
                    }
                };
                window.addEventListener('deviceorientation', checkNeutral);
            }, 500);
        }

        function displayNextWord() {
            if (words.length === 0) words = [...WORD_LIST].sort(() => Math.random() - 0.5);
            document.getElementById('word-display').innerText = words.pop();
            document.body.className = "text-white flex items-center justify-center";
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.remove('flex');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.body.className = "bg-slate-900 text-white flex items-center justify-center";
        }
    </script>
</body>
</html>
